name: phantom-shell-ci

on:
  push:
    branches: ["main"]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: YAML quality and schema contract gate
        run: |
          set -euo pipefail
          make verify

      - name: Run unit tests
        run: |
          set -euo pipefail
          make test
